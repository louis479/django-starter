<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f7fb;
        }

        .navbar {
            background: #2f5fd0;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>Learning Platform</div>
    <div>
        {{ request.user.username }} |
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Dashboard</h2>
        <p>Welcome back, {{ request.user.username }} 👋</p>
    </div>
</div>

</body>
</html>
